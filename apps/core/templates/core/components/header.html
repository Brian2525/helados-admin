<header class="bg-white shadow border-b">

    <div class="px-8 py-4 flex justify-between items-center">

        <div>

            <h2 class="text-2xl font-semibold text-slate-800">

                {% block page_title %}
                Dashboard
                {% endblock %}

            </h2>

            <p class="text-sm text-slate-500 mt-1">

                Bienvenido al sistema ERP

            </p>

        </div>

        <div class="flex items-center gap-4">

            <div class="text-right">

                <p class="font-semibold text-slate-700">

                    {{ request.user }}

                </p>

                {% if request.user.is_superuser %}

                    <span class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded-full">

                        Super Administrador

                    </span>

                {% elif request.user.is_staff %}

                    <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full">

                        Administrador

                    </span>

                {% else %}

                    <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">

                        Usuario

                    </span>

                {% endif %}

            </div>

            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-white font-bold">

                {{ request.user.username|first|upper }}

            </div>

        </div>

    </div>

</header>
