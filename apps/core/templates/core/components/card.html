<div class="bg-white rounded-xl shadow-sm border border-gray-200">

    {% if title %}

    <div class="border-b border-gray-200 px-6 py-4">

        <h2 class="text-lg font-semibold text-gray-800">

            {{ title }}

        </h2>

        {% if subtitle %}

        <p class="text-sm text-gray-500 mt-1">

            {{ subtitle }}

        </p>

        {% endif %}

    </div>

    {% endif %}

    <div class="p-6">

        {{ content }}

    </div>

</div>
