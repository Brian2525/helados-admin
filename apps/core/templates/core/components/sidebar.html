{% load static %}


<aside class="w-64 bg-slate-900 text-white flex flex-col min-h-screen">

    <div class="p-6 border-b border-slate-800">

        <h1 class="text-2xl font-bold">
            ERP Helados
        </h1>

        <p class="text-sm text-slate-400 mt-1">
            Panel Administrativo
        </p>

    </div>

    <nav class="flex-1 p-4 space-y-2">

{% for item in sidebar_menu %}

    {% if item.submenu %}

        <div>

            <button
                class="sidebar-toggle w-full flex items-center justify-between px-4 py-3 rounded-lg hover:bg-slate-800 transition"
                data-target="menu{{ forloop.counter }}">

                <span>

                    {{ item.icono }}
                    {{ item.titulo }}

                </span>

                <svg class="arrow w-4 h-4 transition-transform"
                     fill="none"
                     stroke="currentColor"
                     viewBox="0 0 24 24">

                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M19 9l-7 7-7-7"/>

                </svg>

            </button>

            <div
                id="menu{{ forloop.counter }}"
                class="hidden ml-4 mt-2 space-y-1">

                {% for opcion in item.submenu %}

                    <a href="{{ opcion.url }}"
                       class="block px-4 py-2 rounded-lg hover:bg-slate-800 transition">

                        {{ opcion.titulo }}

                    </a>

                {% endfor %}

            </div>

        </div>

    {% else %}

        <a href="{{ item.url }}"
           class="block px-4 py-3 rounded-lg hover:bg-slate-800 transition">

            {{ item.icono }}
            {{ item.titulo }}

        </a>

    {% endif %}

{% endfor %}

</nav>

    <div class="border-t border-slate-800 p-4">

        <form
            method="post"
            action="{% url 'logout' %}"
        >

            {% csrf_token %}

            <button
                type="submit"
                class="w-full bg-red-600 hover:bg-red-700 rounded-lg py-2 transition"
            >

                Cerrar sesión

            </button>

        </form>

    </div>

</aside>

<script>
document.querySelectorAll(".sidebar-toggle").forEach(button => {

    button.addEventListener("click", function () {

        const menu = document.getElementById(this.dataset.target);

        menu.classList.toggle("hidden");

        const arrow = this.querySelector(".arrow");

        if (arrow) {
            arrow.classList.toggle("rotate-180");
        }

    });

});
</script>
