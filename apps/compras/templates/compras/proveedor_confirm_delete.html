{% extends "core/base_dashboard.html" %}

{% block content %}

<div class="max-w-xl mx-auto">

    <div class="bg-white rounded-xl shadow border border-red-200">

        <div class="border-b border-red-200 px-6 py-5">

            <h2 class="text-xl font-semibold text-red-600">

                Eliminar proveedor

            </h2>

        </div>

        <div class="p-6">

            <p class="text-gray-700">

                ¿Estás seguro de eliminar el proveedor

                <strong>

                    {{ object.nombre }}

                </strong>?

            </p>

            <p class="mt-3 text-sm text-red-500">

                Esta acción no se puede deshacer.

            </p>

            <form method="post" class="mt-8 flex justify-end gap-3">

                {% csrf_token %}

                <a href="{% url 'compras:proveedor_list' %}"
                   class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">

                    Cancelar

                </a>

                <button
                    type="submit"
                    class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg">

                    Eliminar

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
