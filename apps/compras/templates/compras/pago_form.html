{% extends "core/base_dashboard.html" %}

{% block content %}

<div class="max-w-2xl mx-auto">

    <!-- Encabezado -->

    <div class="mb-8 text-center">

        <h1 class="text-3xl font-bold text-gray-900">
            Registrar pago
        </h1>

        <p class="mt-2 text-gray-500">
            Captura la información del pago realizado para esta cuenta.
        </p>

    </div>

    <!-- Formulario -->

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200">

        <div class="px-8 py-6 border-b border-gray-100">

            <h2 class="text-lg font-semibold text-gray-900">
                Información del pago
            </h2>

        </div>

        <form method="post" class="p-8 space-y-6">

            {% csrf_token %}

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Fecha
                </label>

                {{ form.fecha }}

            </div>

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Monto
                </label>

                {{ form.monto }}

            </div>

            <div>

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Observaciones
                </label>

                {{ form.observaciones }}

            </div>

            <div class="pt-4 flex flex-col sm:flex-row justify-end gap-3">

                <a href="{% url 'compras:cuenta_list'%}"
                   class="px-6 py-2.5 rounded-lg border border-gray-300 bg-white text-gray-700 hover:bg-gray-100 transition">

                    Cancelar
                </a>

                

                <button
                    type="submit"
                    class="px-6 py-2.5 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700 transition">

                    Registrar pago

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
