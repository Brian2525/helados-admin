{% extends "core/base_dashboard.html" %}

{% block content %}

<div class="max-w-xl mx-auto mt-10">

    <div class="bg-white rounded-xl shadow border border-red-200">

        <div class="px-6 py-5 border-b border-red-200">

            <h1 class="text-xl font-semibold text-red-600">

                Eliminar cuenta por pagar

            </h1>

        </div>

        <div class="p-6">

            <p class="text-gray-700">

                ¿Deseas eliminar la cuenta por pagar del proveedor

                <strong>

                    {{ object.proveedor.nombre }}

                </strong>?

            </p>

            <p class="mt-2 text-gray-500">

                {{ object.descripcion }}

            </p>

            <p class="mt-4 text-red-600 text-sm">

                Esta acción no se puede deshacer.

            </p>

            <form method="post" class="mt-8 flex justify-end gap-3">

                {% csrf_token %}

                <a href="{% url 'compras:cuenta_list' %}"
                   class="px-5 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">

                    Cancelar

                </a>

                <button
                    type="submit"
                    class="px-5 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700">

                    Eliminar

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
