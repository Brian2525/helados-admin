
{% block content %}

<div class="container mt-4">

    <div class="card">

        <div class="card-header">
            Registrar gasto
        </div>

        <div class="card-body">

            <form method="post"
                  enctype="multipart/form-data">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                        class="btn btn-success">
                    Guardar
                </button>

                <a href="{% url 'gastos:list' %}"
                   class="btn btn-secondary">
                    Cancelar
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
