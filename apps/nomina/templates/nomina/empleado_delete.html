<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Empleado</title>
</head>
<body>

    <h1>Eliminar Empleado</h1>

    <p>
        ¿Estás seguro de eliminar al empleado?
    </p>

    <p>
        <strong>{{ object.nombre }}</strong>
    </p>

    <form method="post">

        {% csrf_token %}

        <button type="submit">
            Sí, eliminar
        </button>

    </form>

    <p>
        <a href="{% url 'nomina:empleado_list' %}">
            Cancelar
        </a>
    </p>

</body>
</html>
