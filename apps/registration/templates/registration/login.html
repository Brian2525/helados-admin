{% extends "core/base_public.html" %}

{% block title %}
Iniciar sesión
{% endblock %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100">

    <div class="bg-white shadow-lg rounded-xl w-full max-w-md p-8">

        <h1 class="text-3xl font-bold text-center mb-8">

            ERP Helados

        </h1>

        <form method="post">

            {% csrf_token %}

            {% if form.errors %}

                <div class="mb-6 rounded-lg bg-red-100 text-red-700 p-3">

                    Usuario o contraseña incorrectos.

                </div>

            {% endif %}

            <div class="mb-4">

                <label class="block mb-2">

                    Usuario

                </label>

                {{ form.username }}

            </div>

            <div class="mb-6">

                <label class="block mb-2">

                    Contraseña

                </label>

                {{ form.password }}

            </div>

            <button
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg"
                type="submit"
            >

                Entrar

            </button>

        </form>

    </div>

</div>

{% endblock %}
